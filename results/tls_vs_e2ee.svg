<svg viewBox="0 0 1000 620" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <rect width="1000" height="620" fill="#ffffff"/>
  <text x="500" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">So sanh: Ma hoa duong truyen (TLS-only) vs Ma hoa dau cuoi (E2EE)</text>

  <!-- ============ SCENARIO A: TLS-only ============ -->
  <text x="40" y="80" font-size="17" font-weight="bold" fill="#b3261e">Kich ban A - TLS-only (khong phai E2EE)</text>

  <!-- Device -->
  <rect x="40" y="100" width="150" height="70" rx="8" fill="#e8f0fe" stroke="#3b5bdb" stroke-width="2"/>
  <text x="115" y="130" text-anchor="middle" font-size="14" font-weight="bold">Device</text>
  <text x="115" y="150" text-anchor="middle" font-size="11">(cam bien IoT)</text>

  <!-- arrow 1 -->
  <line x1="190" y1="135" x2="330" y2="135" stroke="#3b5bdb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="260" y="120" text-anchor="middle" font-size="11" fill="#3b5bdb">TLS (ma hoa</text>
  <text x="260" y="132" text-anchor="middle" font-size="11" fill="#3b5bdb">tren duong truyen)</text>

  <!-- Cloud -->
  <rect x="330" y="90" width="180" height="90" rx="8" fill="#fdecea" stroke="#b3261e" stroke-width="2.5"/>
  <text x="420" y="118" text-anchor="middle" font-size="14" font-weight="bold">Cloud / Server</text>
  <text x="420" y="136" text-anchor="middle" font-size="11" fill="#b3261e" font-weight="bold">GIAI MA duoc</text>
  <text x="420" y="152" text-anchor="middle" font-size="11" fill="#b3261e" font-weight="bold">DOC BAN RO du lieu</text>
  <text x="420" y="168" text-anchor="middle" font-size="10">(nhip tim, phong, ghi chu...)</text>

  <!-- arrow 2 -->
  <line x1="510" y1="135" x2="650" y2="135" stroke="#3b5bdb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="580" y="120" text-anchor="middle" font-size="11" fill="#3b5bdb">TLS</text>

  <!-- App -->
  <rect x="650" y="100" width="150" height="70" rx="8" fill="#e8f0fe" stroke="#3b5bdb" stroke-width="2"/>
  <text x="725" y="130" text-anchor="middle" font-size="14" font-weight="bold">App</text>
  <text x="725" y="150" text-anchor="middle" font-size="11">(nguoi dung cuoi)</text>

  <text x="40" y="205" font-size="12" fill="#444">Rui ro: neu Cloud bi xam nhap hoac nhan vien noi bo lam sai, du lieu nhay cam bi lo/sua ngay tai lop trung gian.</text>

  <line x1="20" y1="230" x2="980" y2="230" stroke="#cccccc" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ============ SCENARIO B: E2EE ============ -->
  <text x="40" y="270" font-size="17" font-weight="bold" fill="#1e7d32">Kich ban B - End-to-End Encryption (E2EE)</text>

  <!-- Device -->
  <rect x="40" y="290" width="150" height="70" rx="8" fill="#e6f4ea" stroke="#1e7d32" stroke-width="2"/>
  <text x="115" y="320" text-anchor="middle" font-size="14" font-weight="bold">Device</text>
  <text x="115" y="340" text-anchor="middle" font-size="11">ma hoa AES-256-GCM</text>

  <!-- key icon shared between device and app -->
  <text x="115" y="375" text-anchor="middle" font-size="20">&#128273;</text>
  <text x="115" y="392" text-anchor="middle" font-size="10">Khoa E2EE (chi Device+App)</text>

  <!-- arrow 1 -->
  <line x1="190" y1="325" x2="330" y2="325" stroke="#1e7d32" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="260" y="310" text-anchor="middle" font-size="11" fill="#1e7d32">ciphertext</text>

  <!-- Cloud -->
  <rect x="330" y="280" width="180" height="90" rx="8" fill="#f1f3f4" stroke="#5f6368" stroke-width="2.5"/>
  <text x="420" y="308" text-anchor="middle" font-size="14" font-weight="bold">Cloud / Server</text>
  <text x="420" y="326" text-anchor="middle" font-size="11" fill="#5f6368" font-weight="bold">CHI luu / chuyen tiep</text>
  <text x="420" y="342" text-anchor="middle" font-size="11" fill="#5f6368" font-weight="bold">KHONG co khoa giai ma</text>
  <text x="420" y="358" text-anchor="middle" font-size="10">chi thay chuoi vo nghia</text>

  <!-- lock icon over cloud -->
  <text x="420" y="285" text-anchor="middle" font-size="18">&#128274;</text>

  <!-- arrow 2 -->
  <line x1="510" y1="325" x2="650" y2="325" stroke="#1e7d32" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="580" y="310" text-anchor="middle" font-size="11" fill="#1e7d32">ciphertext</text>
  <text x="580" y="345" text-anchor="middle" font-size="10" fill="#888">(nguyen ven, khong doi)</text>

  <!-- App -->
  <rect x="650" y="290" width="150" height="70" rx="8" fill="#e6f4ea" stroke="#1e7d32" stroke-width="2"/>
  <text x="725" y="320" text-anchor="middle" font-size="14" font-weight="bold">App</text>
  <text x="725" y="340" text-anchor="middle" font-size="11">giai ma bang khoa E2EE</text>
  <text x="725" y="375" text-anchor="middle" font-size="20">&#128273;</text>

  <text x="40" y="400" font-size="12" fill="#444">Uu diem: Cloud khong the doc/sua noi dung that su; phu hop du lieu rat nhay cam (y te, camera, khoa cua).</text>
  <text x="40" y="418" font-size="12" fill="#444">Danh doi: quan ly khoa, khoi phuc tai khoan va debug tai cloud deu kho hon vi cloud khong "thay" duoc du lieu.</text>

  <!-- ============ Bang tom tat nho ============ -->
  <rect x="40" y="450" width="920" height="150" rx="6" fill="#fafafa" stroke="#cccccc"/>
  <text x="500" y="475" text-anchor="middle" font-size="14" font-weight="bold">Ai doc duoc du lieu ban ro?</text>

  <text x="70" y="505" font-size="12" font-weight="bold">Vi tri</text>
  <text x="330" y="505" font-size="12" font-weight="bold">TLS-only</text>
  <text x="600" y="505" font-size="12" font-weight="bold">E2EE</text>

  <line x1="60" y1="513" x2="940" y2="513" stroke="#dddddd"/>

  <text x="70" y="535" font-size="12">Tren duong truyen (attacker MITM)</text>
  <text x="330" y="535" font-size="12" fill="#1e7d32">Khong doc duoc (co TLS)</text>
  <text x="600" y="535" font-size="12" fill="#1e7d32">Khong doc duoc</text>

  <text x="70" y="558" font-size="12">Tai Cloud/Server</text>
  <text x="330" y="558" font-size="12" fill="#b3261e" font-weight="bold">DOC DUOC ban ro</text>
  <text x="600" y="558" font-size="12" fill="#1e7d32" font-weight="bold">Khong doc duoc</text>

  <text x="70" y="581" font-size="12">Tai App / thiet bi dau cuoi</text>
  <text x="330" y="581" font-size="12">Doc duoc</text>
  <text x="600" y="581" font-size="12">Doc duoc</text>

  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b5bdb"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1e7d32"/>
    </marker>
  </defs>
</svg>
